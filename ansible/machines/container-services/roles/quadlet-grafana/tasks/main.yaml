- name: Ensure Grafana directories exist
  become: true
  loop:
  - /var/mnt/grafana/data
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: grafana
    group: grafana
    mode: '0700'
- name: Create Grafana quadlet
  become: true
  containers.podman.podman_container:
    name: grafana
    state: quadlet
    image: docker.io/grafana/grafana:12.4.0-20648027705
    uidmap: ["472:2004", "0:3000"]
    gidmap: ["0:2004"]
    volume:
    - /var/mnt/grafana/data:/var/lib/grafana:z
    network:
    - observability-stack.network
    - proxy.network
    - podman
    ports:
    - "3000:3000"
    quadlet_options:
    - |
      [Unit]
      RequiresMountsFor=/var/mnt/grafana/data

      [Service]
      Restart=on-failure
      RestartSec=5s

      [Install]
      WantedBy=default.target
  register: container_definition
- name: systemd daemon-reload
  become: true
  ansible.builtin.systemd:
    daemon_reload: true
- name: (Re)start grafana service
  become: true
  ansible.builtin.systemd:
    name: grafana
    enabled: true
    state: "{{ 'restarted' if container_definition.changed else 'started' }}"
