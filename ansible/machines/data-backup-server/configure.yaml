- hosts: data-backup-server.willtaylor.info
  remote_user: ansible
  roles:
  - role: ../../common/roles/create-system-groups
    system_groups:
    - name: rclone
      gid: 2500
  - role: ../../common/roles/create-system-users
    system_users:
    - username: rclone-server
      uid: 2000
      groups: [rclone]
    - username: rclone-sync
      uid: 2001
      groups: [rclone]
  - role: ../../common/roles/prepare-disks
    disks:
    - serial: viscsi-backup-data
      label: backup-data
      mountpoint: /var/mnt/backup/data
      owner: root
      group: rclone
      mode: "0770"
  - role: ./roles/configure-rclone-server
  - role: ./roles/configure-databasus
  - role: ./roles/configure-rclone-sync
    systemd:
      on_calendar: "*-*-* 03:00:00"
  - role: ../../common/roles/restic-backup
    repository:
      url: rest:http://data-backup-server.willtaylor.info:8080/hosts/data-backup-server/quadlets/databasus
      password: "{{ (lookup('community.hashi_vault.vault_kv2_get', 'system/data-backup-server/restic_credentials', url=vault_address, engine_mount_point=vault_secret_mount)).secret.repoPassword }}"
      rest_username: "{{ (lookup('community.hashi_vault.vault_kv2_get', 'system/data-backup-server/restic_credentials', url=vault_address, engine_mount_point=vault_secret_mount)).secret.username }}"
      rest_password: "{{ (lookup('community.hashi_vault.vault_kv2_get', 'system/data-backup-server/restic_credentials', url=vault_address, engine_mount_point=vault_secret_mount)).secret.password }}"
    retention:
      daily: 2
      weekly: 0
      monthly: 0
      yearly: 0
    systemd:
      on_calendar: "*-*-* 02:00:00"
      unit_suffix: databasus
    backup_now: true
    directories:
    - /var/mnt/backup/data/databasus
  - role: ../../common/roles/vector-agent
    vector_config:
      data_dir: /opt/vector/data
      api:
        enabled: true
      schema:
        log_namespace: true
      sources:
        vector_logs:
          type: internal_logs
        journald:
          type: journald
        host_metrics:
          type: host_metrics
          scrape_interval_secs: 60
          filesystem:
            devices:
              excludes: [binfmt_misc]
            filesystems:
              includes:
              - ext*
              - xfs
              - ntfs
              - btrfs
              - zfs
              - vfat
              - fat32
            mountPoints:
              excludes:
              - "*/proc/sys/fs/binfmt_misc"
              - "/var/lib/containers/**"
        vector_internal_metrics:
          type: internal_metrics
          scrape_interval_secs: 60
      transforms:
        mapped_journal_logs:
          type: remap
          inputs: [journald]
          source: |-
            .message = .
            .timestamp = %journald.timestamp
            .host = %journald.host
            .service = %journald.metadata._SYSTEMD_UNIT
      sinks:
        console:
          type: console
          inputs: ["vector_logs"]
          encoding:
            codec: text
        vector_server:
          type: vector
          inputs: [host_metrics, mapped_journal_logs, vector_internal_metrics]
          address: http://vector.tk831.net:6001
          version: "2"
          tls:
            enabled: false
