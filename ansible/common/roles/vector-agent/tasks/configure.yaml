- name: Ensure vector-agent user exists
  become: true
  ansible.builtin.user:
    name: vector-agent
    groups: "{{ agent_user.groups | default([\"systemd-journal\", \"docker\"]) }}"
    system: true
    create_home: false
- name: Ensure vector directories exists
  become: true
  file:
    state: directory
    path: "{{ item }}"
    owner: vector-agent
    group: vector-agent
    mode: '0750'
  loop:
  - /opt/vector
  - /opt/vector/config
  - /opt/vector/data
- name: Ensure Systemd vector.service.d Directory Exists
  become: true
  ansible.builtin.file:
    name: /etc/systemd/system/vector.service.d
    state: directory
    owner: root
    group: root
    mode: '0755'
- name: Override vector.service Systemd Unit
  become: true
  copy:
    dest: /etc/systemd/system/vector.service.d/override.conf
    owner: root
    group: root
    mode: '0644'
    content: |
      [Service]
      User=vector-agent
      Group=vector-agent
      ExecStartPre=
      ExecStartPre=/usr/bin/vector validate /opt/vector/config/vector.yaml
      ExecStart=
      ExecStart=/usr/bin/vector --config /opt/vector/config/vector.yaml
      ExecReload=
      ExecReload=/usr/bin/vector validate /opt/vector/config/vector.yaml
      ExecReload=/bin/kill -HUP $MAINPID
- name: Copy Vector Config File
  become: true
  copy:
    content: "{{ vector_config | to_nice_yaml }}"
    dest: /opt/vector/config/vector.yaml
    owner: vector-agent
    group: vector-agent
    mode: '0640'
  notify: Restart Vector
- name: Enable vector Service
  become: true
  ansible.builtin.systemd:
    daemon_reload: true
    name: vector
    state: started
    enabled: true
