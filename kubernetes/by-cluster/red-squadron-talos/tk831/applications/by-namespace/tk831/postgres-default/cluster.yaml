apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres-tk831-default
spec:
  imageName: ghcr.io/cloudnative-pg/postgresql:15.1
  instances: 1
  primaryUpdateStrategy: unsupervised
  superuserSecret:
    name: postgres-default-admin-credentials
  enableSuperuserAccess: true
  storage:
    storageClass: proxmox-zfs
    size: 20Gi
    resizeInUseVolumes: false
  walStorage:
    storageClass: proxmox-zfs
    size: 2Gi
    resizeInUseVolumes: false
  postgresql:
    parameters:
      max_slot_wal_keep_size: "1GB"
  managed:
    roles:
    - name: gitea
      ensure: present
      comment: Gitea app user
      superuser: false
      login: true
      passwordSecret:
        name: postgres-tk831-default-role-gitea
    - name: keycloak
      ensure: present
      comment: Keycloak app user
      superuser: false
      login: true
      passwordSecret:
        name: postgres-tk831-default-role-keycloak
    - name: nextcloud
      ensure: present
      comment: Nextcloud app user
      superuser: false
      login: true
      passwordSecret:
        name: postgres-tk831-default-role-nextcloud
    - name: paperless
      ensure: present
      comment: Paperless app user
      superuser: false
      login: true
      passwordSecret:
        name: postgres-tk831-default-role-paperless
  resources:
    requests:
      memory: "512Mi"
